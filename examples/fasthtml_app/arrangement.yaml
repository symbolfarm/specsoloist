# FastHTML App — Arrangement
#
# Build: sp conduct specs/ --arrangement arrangement.yaml
#
# Requires: uv sync (installs python-fasthtml, pytest, httpx)

target_language: python

output_paths:
  implementation: src/{name}.py
  tests: tests/test_{name}.py

environment:
  tools:
    - uv
    - pytest
  setup_commands:
    - uv sync
  dependencies:
    python-fasthtml: ">=0.12,<0.13"
    starlette: ">=0.52"
    httpx: ">=0.24"
    pytest: ">=7.0"
    # fastlite is bundled with python-fasthtml — no separate install needed

build_commands:
  compile: ""
  lint: ""
  test: uv run pytest

constraints:
  - Use python-fasthtml (import from fasthtml.common)
  - fasthtml_interface.spec.md and fastlite_interface.spec.md are reference specs — they describe the API but generate no code
  - "Three-spec decomposition: state (data model) -> layout (UI components) -> routes (HTTP handlers)"
  - "Database variant: db (data access via fastlite) -> layout -> routes_db (HTTP handlers with persistence)"
  - "Use Pico CSS for styling: fast_app(hdrs=(picolink,)) in routes.py; wrap page content in Main(..., cls='container')"
  - state.py and db.py must be independently testable with no HTTP or FastHTML imports
  - db.py tests must use open_db(":memory:") for isolated, fast tests
  - layout.py builds FastHTML components; tests render them to strings and check for expected attributes
  - routes.py imports from state and layout; tests use the Starlette TestClient
  - routes.py must be runnable with `python src/routes.py` (guarded serve() call)
  - Tests for routes.py must include a test that GET / returns HTML containing hx-delete attributes
