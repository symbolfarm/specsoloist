site_name: SpecSoloist
site_description: Spec-as-Source AI coding framework
site_author: Toby Lightheart
repo_url: https://github.com/symbolfarm/specsoloist

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            separate_signature: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables

nav:
  - Home: index.md
  - Getting Started: getting_started.md
  - Guide:
      - The Workflow: guide/workflow.md
      - Arrangement: guide/arrangement.md
      - Agents: guide/agents.md
  - Core Concepts:
      - Spec-as-Source: concepts/spec_as_source.md
      - Self-Healing: concepts/self_healing.md
  - Reference:
      - CLI: reference/cli.md
      - Spec Types: reference/spec-types.md
      - Public API: reference/api.md
      - Internals: reference/internals.md
  - Patterns:
      - Incremental Adoption: incremental-adoption.md
      - Database Patterns: database-patterns.md
      - E2E Testing: e2e-testing.md
  - Examples:
      - Math (Python): examples/math_demo.md
      - FastHTML Todo App: examples/ml_demo.md
      - Next.js AI Chat: examples/ts_demo.md
