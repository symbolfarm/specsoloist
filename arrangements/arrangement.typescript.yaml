target_language: typescript

output_paths:
  implementation: src/{name}.ts
  tests: tests/{name}.test.ts

environment:
  tools:
    - npm
    - npx
    - tsx
    - vitest
  config_files:
    package.json: |
      {
        "name": "{project_name}",
        "version": "1.0.0",
        "description": "TypeScript project generated by SpecSoloist",
        "main": "index.js",
        "scripts": {
          "test": "vitest"
        },
        "devDependencies": {
          "typescript": "^5.0.0",
          "vitest": "^1.0.0",
          "tsx": "^4.0.0",
          "eslint": "^8.0.0"
        }
      }
    tsconfig.json: |
      {
        "compilerOptions": {
          "target": "ES2020",
          "module": "ESNext",
          "moduleResolution": "node",
          "strict": true,
          "esModuleInterop": true,
          "skipLibCheck": true,
          "forceConsistentCasingInFileNames": true,
          "outDir": "./dist"
        },
        "include": ["src/**/*"],
        "exclude": ["node_modules", "tests"]
      }
  setup_commands:
    - npm install --no-package-lock

build_commands:
  compile: npx tsc --noEmit
  lint: npx eslint src/**/*.ts
  test: npx vitest run {file}

constraints:
  - Must follow strict TypeScript mode
  - Must use ES6 modules (import/export)
  - Must include type definitions for all exports
